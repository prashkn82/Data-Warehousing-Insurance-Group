<svg width="680" height="600" viewBox="0 0 680 600" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Sample premium trend dashboard</title>
<desc>Shows total premium of $11,300, 3 active policies, $16,550 in total claims, and 20 day average settlement. A bar chart shows monthly premium collected: January $1,200, March $4,800, June $3,200, September $2,100. A horizontal bar chart shows premium by region: South $4,800, Midwest $4,400, West $2,100.</desc>

<rect x="0" y="0" width="680" height="600" fill="#FFFFFF"/>

<g>
<rect x="20" y="20" width="150" height="70" rx="8" fill="#F1EFE8"/>
<text x="35" y="45" font-family="sans-serif" font-size="12" fill="#5F5E5A">Total premium</text>
<text x="35" y="72" font-family="sans-serif" font-size="20" font-weight="500" fill="#2C2C2A">$11,300</text>
</g>
<g>
<rect x="180" y="20" width="150" height="70" rx="8" fill="#F1EFE8"/>
<text x="195" y="45" font-family="sans-serif" font-size="12" fill="#5F5E5A">Active policies</text>
<text x="195" y="72" font-family="sans-serif" font-size="20" font-weight="500" fill="#2C2C2A">3</text>
</g>
<g>
<rect x="340" y="20" width="150" height="70" rx="8" fill="#F1EFE8"/>
<text x="355" y="45" font-family="sans-serif" font-size="12" fill="#5F5E5A">Total claims</text>
<text x="355" y="72" font-family="sans-serif" font-size="20" font-weight="500" fill="#2C2C2A">$16,550</text>
</g>
<g>
<rect x="500" y="20" width="160" height="70" rx="8" fill="#F1EFE8"/>
<text x="515" y="45" font-family="sans-serif" font-size="12" fill="#5F5E5A">Avg settlement</text>
<text x="515" y="72" font-family="sans-serif" font-size="20" font-weight="500" fill="#2C2C2A">20 days</text>
</g>

<text x="20" y="130" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Monthly premium trend</text>

<line x1="60" y1="290" x2="640" y2="290" stroke="#C3C2B7" stroke-width="1"/>
<line x1="60" y1="150" x2="640" y2="150" stroke="#E1E0D9" stroke-width="1"/>
<line x1="60" y1="185" x2="640" y2="185" stroke="#E1E0D9" stroke-width="1"/>
<line x1="60" y1="220" x2="640" y2="220" stroke="#E1E0D9" stroke-width="1"/>
<line x1="60" y1="255" x2="640" y2="255" stroke="#E1E0D9" stroke-width="1"/>

<rect x="120" y="255" width="60" height="35" rx="4" fill="#2A78D6"/>
<text x="150" y="248" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#2C2C2A">$1,200</text>
<text x="150" y="308" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#898781">Jan</text>

<rect x="270" y="150" width="60" height="140" rx="4" fill="#2A78D6"/>
<text x="300" y="143" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#2C2C2A">$4,800</text>
<text x="300" y="308" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#898781">Mar</text>

<rect x="420" y="197" width="60" height="93" rx="4" fill="#2A78D6"/>
<text x="450" y="190" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#2C2C2A">$3,200</text>
<text x="450" y="308" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#898781">Jun</text>

<rect x="570" y="229" width="60" height="61" rx="4" fill="#2A78D6"/>
<text x="600" y="222" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#2C2C2A">$2,100</text>
<text x="600" y="308" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#898781">Sep</text>

<text x="20" y="360" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Premium by region</text>

<text x="20" y="405" font-family="sans-serif" font-size="12" fill="#898781">South</text>
<rect x="90" y="390" width="480" height="24" rx="4" fill="#1BAF7A"/>
<text x="580" y="406" font-family="sans-serif" font-size="12" fill="#2C2C2A">$4,800</text>

<text x="20" y="445" font-family="sans-serif" font-size="12" fill="#898781">Midwest</text>
<rect x="90" y="430" width="440" height="24" rx="4" fill="#1BAF7A"/>
<text x="540" y="446" font-family="sans-serif" font-size="12" fill="#2C2C2A">$4,400</text>

<text x="20" y="485" font-family="sans-serif" font-size="12" fill="#898781">West</text>
<rect x="90" y="470" width="210" height="24" rx="4" fill="#1BAF7A"/>
<text x="310" y="486" font-family="sans-serif" font-size="12" fill="#2C2C2A">$2,100</text>

</svg>
