<svg width="680" height="620" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Full ETL flow diagram</title>
<desc>Shows the end-to-end data pipeline for the insurance data warehouse: source systems, staging area, Informatica ETL layer with cleansing/SCD/lookups/aggregation, the Oracle data warehouse split into dimensions/facts/SCD history, and the Business Objects reporting layer producing reports and dashboards.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="680" height="620" fill="#FFFFFF"/>

<g>
<rect x="240" y="20" width="200" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="42" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Source systems</text>
</g>
<line x1="340" y1="64" x2="340" y2="100" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="240" y="100" width="200" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="122" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">Staging area</text>
</g>
<line x1="340" y1="144" x2="340" y2="180" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="150" y="180" width="380" height="30" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="195" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">Informatica ETL layer</text>
</g>

<line x1="230" y1="210" x2="180" y2="250" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="290" y1="210" x2="280" y2="250" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="390" y1="210" x2="400" y2="250" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="450" y1="210" x2="500" y2="250" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="100" y="250" width="150" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="175" y="272" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3C3489">Cleansing</text>
</g>
<g>
<rect x="220" y="250" width="120" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="280" y="272" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3C3489">SCD handling</text>
</g>
<g>
<rect x="340" y="250" width="120" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="400" y="272" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3C3489">Lookups</text>
</g>
<g>
<rect x="460" y="250" width="150" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="535" y="272" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3C3489">Aggregation</text>
</g>

<line x1="175" y1="294" x2="340" y2="330" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="280" y1="294" x2="340" y2="330" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="400" y1="294" x2="340" y2="330" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="535" y1="294" x2="340" y2="330" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="150" y="330" width="380" height="30" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="345" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#042C53">Data warehouse (Oracle 9i)</text>
</g>

<line x1="230" y1="360" x2="220" y2="400" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="360" x2="340" y2="400" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="450" y1="360" x2="460" y2="400" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="140" y="400" width="160" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="220" y="422" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0C447C">Dimensions</text>
</g>
<g>
<rect x="260" y="400" width="160" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="422" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0C447C">Facts</text>
</g>
<g>
<rect x="380" y="400" width="160" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="460" y="422" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0C447C">SCD history</text>
</g>

<line x1="220" y1="444" x2="340" y2="480" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="444" x2="340" y2="480" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="460" y1="444" x2="340" y2="480" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="240" y="480" width="200" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="502" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">Business Objects</text>
</g>
<line x1="340" y1="524" x2="340" y2="560" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="220" y="560" width="240" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="582" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">Reports and dashboards</text>
</g>

</svg>
